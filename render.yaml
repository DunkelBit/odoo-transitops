services:
  - type: web
    name: transitops-app
    runtime: docker
    plan: free
    port: 8069
    healthCheckPath: /web/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: transitops-db-fresh
          property: host
      - key: DB_PORT
        fromDatabase:
          name: transitops-db-fresh
          property: port
      - key: DB_USER
        fromDatabase:
          name: transitops-db-fresh
          property: user
      - key: DB_PASS
        fromDatabase:
          name: transitops-db-fresh
          property: password
      - key: DB_NAME
        fromDatabase:
          name: transitops-db-fresh
          property: database
      - key: ODOO_ADMIN_PASSWD
        generateValue: true

databases:
  - name: transitops-db-fresh
    plan: free
