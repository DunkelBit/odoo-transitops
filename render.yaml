services:
  - type: web
    name: transitops-app
    runtime: docker
    plan: free
    healthCheckPath: /web/health
    envVars:
      - key: PORT
        value: "8069"
      - key: HOST
        fromDatabase:
          name: transitops-db-fresh
          property: host
      - key: USER
        fromDatabase:
          name: transitops-db-fresh
          property: user
      - key: PASSWORD
        fromDatabase:
          name: transitops-db-fresh
          property: password
      - key: PGDATABASE
        fromDatabase:
          name: transitops-db-fresh
          property: database
      - key: PGPORT
        fromDatabase:
          name: transitops-db-fresh
          property: port
      - key: ODOO_ADMIN_PASSWD
        generateValue: true
    dockerCommand: /bin/sh -c "odoo -d $PGDATABASE -i base --stop-after-init --no-http --db_port=$PGPORT && odoo -d $PGDATABASE --db_port=$PGPORT"

databases:
  - name: transitops-db-fresh
    plan: free
